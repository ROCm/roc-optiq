name: Windows Continuous Integration 
run-name: roc-optiq-windows-ci

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'JSON array of OS versions to test'
        type: string
        default: '[ "2022" ]'
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'x64-release'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Windows Release Build'
      enable_internal_banner:
        description: 'Enable the internal banner?'
        type: boolean
        default: false
      upload_to_github:
        description: 'Upload build artifacts to GitHub Artifacts?'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Upload built artifacts to the roc-optiq S3 bucket?'
        type: boolean
        default: false
      s3_root_directory:
        description: 'The root directory to use when uploading to the roc-optiq S3 bucket'
        type: choice
        default: 'test'
        options: 
          - test
          - nightly
          - rc
          - release
      release_version:
        description: 'Manually specify a release version to use in the S3 bucket path. Defaults to YYYY_MM_DD timestamp if left empty.'
        type: string
        default: ''
      crypto_backend:
        description: 'Crypto backend for libssh2 (mbedTLS or OpenSSL)'
        type: string
        default: 'mbedTLS'
  workflow_call:
    inputs:
      os_version:
        description: 'JSON array of OS versions to test'
        type: string
        default: '[ "2022" ]'
      crypto_backend:
        description: 'Crypto backend for libssh2 (mbedTLS or OpenSSL)'
        type: string
        default: 'mbedTLS'
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'x64-release'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Windows Release Build'
      enable_internal_banner:
        description: 'Enable the internal banner?'
        type: boolean
        default: false
      upload_to_github:
        description: 'Upload build artifacts to GitHub Artifacts?'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Upload built artifacts to the roc-optiq S3 bucket?'
        type: boolean
        default: false
      s3_root_directory:
        description: 'The root directory to use when uploading to the roc-optiq S3 bucket'
        type: string
        default: 'test'
      release_version:
        description: 'Manually specify a release version to use in the S3 bucket path. Defaults to YYYY_MM_DD timestamp if left empty.'
        type: string
        default: ''

env:
  BUILD_DIR: "build"
  DIST_DIR: "dist"
  BINARY_DIR: ${{ inputs.cmake_config_preset == 'x64-debug' && 'Debug' || inputs.cmake_config_preset == 'x64-release-symbols' && 'RelWithDebInfo' || 'Release' }}
  BUILD_FILE_NAME: "roc-optiq"
  ENABLE_INTERNAL_BANNER: ${{ inputs.enable_internal_banner == 'true' && 'ON' || 'OFF' }}
  S3_ROOT_DIRECTORY: ${{ inputs.s3_root_directory }}
  RELEASE_VERSION: ${{ inputs.release_version }}

jobs:
  windows:
    name: Windows ${{ matrix.os-version }} • Optiq CI • GitHub Artifacts (${{ inputs.upload_to_github }}) • S3 Artifacts (${{ inputs.upload_to_s3 }})
    runs-on: windows-${{ matrix.os-version }}
    defaults:
      run:
        shell: pwsh
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: 
        os-version: ${{ fromJson(inputs.os_version) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: true
      
      - name: Install Vulkan SDK
        run: |
          curl -O https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe?Human=true
          ./vulkan_sdk.exe --accept-licenses --default-answer --confirm-command install

      - name: Set Vulkan SDK environment variables
        run: |
          $vulkanRoot = Get-ChildItem -Directory "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { Write-Host "Vulkan SDK not found!"; exit 1 }
          echo "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$($vulkanRoot.FullName)\Bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIB=$($vulkanRoot.FullName)\Lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install OpenSSL
        if: inputs.crypto_backend == 'OpenSSL'
        run: |
          choco install openssl --no-progress -y
          # CI-owned resolution order: prefer Chocolatey's Win64 layout over the
          # runner image copy under "OpenSSL" (ambiguous Get-ChildItem sort was
          # picking the wrong tree). First match must have headers + bin DLLs.
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64",
            "C:\Program Files\OpenSSL"
          )
          $opensslRoot = $null
          foreach ($c in $candidates) {
            if (-not (Test-Path $c)) { continue }
            $sslHeader = Join-Path $c "include\openssl\ssl.h"
            $binDir = Join-Path $c "bin"
            if (-not (Test-Path $sslHeader)) { continue }
            $dlls = @(Get-ChildItem -Path $binDir -Filter "libcrypto*.dll" -ErrorAction SilentlyContinue)
            if ($dlls.Count -eq 0) { continue }
            $opensslRoot = $c
            break
          }
          if (-not $opensslRoot) {
            Write-Host "CI: OpenSSL not found in managed paths (checked: $($candidates -join ', '))"
            exit 1
          }
          Write-Host "CI OPENSSL_ROOT_DIR=$opensslRoot"
          echo "OPENSSL_ROOT_DIR=$opensslRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$opensslRoot\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Newer Shining Light / choco builds nest the MSVC import libs under
          # lib\VC\x64\MD (dynamic CRT release). CMake's FindOpenSSL may not find
          # them from OPENSSL_ROOT_DIR alone, so locate and export explicit hints.
          $crypto = Get-ChildItem -Path $opensslRoot -Recurse -Filter "libcrypto.lib" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64\\MD\\" -and $_.FullName -notmatch "static" } | Select-Object -First 1
          $ssl = Get-ChildItem -Path $opensslRoot -Recurse -Filter "libssl.lib" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64\\MD\\" -and $_.FullName -notmatch "static" } | Select-Object -First 1
          if ($crypto -and $ssl) {
            echo "OPENSSL_LIB_EAY_RELEASE=$($crypto.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "OPENSSL_SSL_EAY_RELEASE=$($ssl.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build, Make, and Verify Installation
        run: |
          mkdir build
          $opensslArgs = @()
          if ("${{ inputs.crypto_backend }}" -eq "OpenSSL") {
            # Prefer the install tree we just configured (choco) over any other
            # OpenSSL on the runner image (e.g. C:\Program Files\OpenSSL).
            if ($env:OPENSSL_ROOT_DIR) {
              $opensslArgs += "-DOPENSSL_ROOT_DIR=$($env:OPENSSL_ROOT_DIR)"
            }
            if ($env:OPENSSL_LIB_EAY_RELEASE) {
              $opensslArgs += @(
                "-DLIB_EAY_RELEASE=$env:OPENSSL_LIB_EAY_RELEASE",
                "-DSSL_EAY_RELEASE=$env:OPENSSL_SSL_EAY_RELEASE",
                "-DOPENSSL_INCLUDE_DIR=$env:OPENSSL_ROOT_DIR\include"
              )
            }
          }
          cmake --preset "${{ inputs.cmake_config_preset }}" -DROCPROFVIS_ENABLE_INTERNAL_BANNER=${{ env.ENABLE_INTERNAL_BANNER }} -DCRYPTO_BACKEND=${{ inputs.crypto_backend }} @opensslArgs
          cmake --build ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }} --preset "${{ inputs.cmake_build_preset }}" --parallel 4
          if (Test-Path "${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/${{ env.BINARY_DIR }}/${env:BUILD_FILE_NAME}.exe") {
            Write-Host "✅ $env:BUILD_FILE_NAME has been successfully built!"
          } else {
            Write-Host "❌ $env:BUILD_FILE_NAME was not built!"
            exit 1
          }

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        timeout-minutes: 10
        run: |
          cd ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}
          ctest `
            -C ${{ env.BINARY_DIR }} `
            --output-on-failure `
            --no-tests=error `
            --output-junit ctest-results.xml

      - name: Upload Test Logs (on failure)
        if: steps.run_tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-windows-${{ matrix.os-version }}
          path: |
            ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/ctest-results.xml
            ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/Testing/Temporary/**
          retention-days: 7

      - name: Prepare Distribution Artifacts
        run: |
          mkdir ${{ env.DIST_DIR }} -Force
          $Bin = "${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/${{ env.BINARY_DIR }}"
          Copy-Item "$Bin/${{ env.BUILD_FILE_NAME }}.exe" "${{ env.DIST_DIR }}/"
          Copy-Item "$Bin/*.dll" "${{ env.DIST_DIR }}/" -ErrorAction SilentlyContinue
          Copy-Item "$Bin/${{ env.BUILD_FILE_NAME }}.pdb" "${{ env.DIST_DIR }}/" -ErrorAction SilentlyContinue
          Get-ChildItem "${{ env.DIST_DIR }}"
      
      - name: Upload GitHub Artifacts
        if: ${{ inputs.upload_to_github }}
        uses: actions/upload-artifact@v7
        with:
          name: roc-optiq-windows-${{ matrix.os-version }}-release
          path: | 
            ${{ env.DIST_DIR }}
          retention-days: 2

      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Build to S3
        if: ${{ inputs.upload_to_s3 }}
        run: |
          $timestamp = Get-Date -Format "yyyy_MM_dd"
          if (-not $env:RELEASE_VERSION) {
              Write-Host "No release version provided, defaulting to using TIMESTAMP as S3_SECONDARY_DIRECTORY"
              $S3_SECONDARY_DIRECTORY = Get-Date -Format "yyyy_MM_dd"
          } else {
              Write-Host "Release Version $env:RELEASE_VERSION provided, using $env:RELEASE_VERSION as S3_SECONDARY_DIRECTORY"
              $S3_SECONDARY_DIRECTORY = $env:RELEASE_VERSION
          }
          aws s3 cp --recursive ${{ env.DIST_DIR }} s3://${{ secrets.AWS_S3_BUCKET }}/${{ env.S3_ROOT_DIRECTORY }}/$S3_SECONDARY_DIRECTORY/windows/ `
            --no-progress
      
      - name: Announce Test Failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "Tests have failed! Please see uploaded CTest logs for more information"
          exit 1
