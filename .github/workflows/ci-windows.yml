name: Windows Continuous Integration 
run-name: roc-optiq-windows-ci

on:
  workflow_call:
    inputs:
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'x64-debug'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Windows Debug Build'
      upload_to_s3:
        description: 'Boolean to enable/disable uploading to S3'
        type: boolean
        default: false

env:
  BUILD_DIR: "build/x64-debug"
  DIST_DIR: "dist"
  BUILD_FILE_NAME: "roc-optiq.exe"

jobs:
  windows:
    name: Windows • Build Optiq • Upload to S3 (${{ inputs.upload_to_s3 }})
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
      
      - name: Install Vulkan SDK
        run: |
          curl -O https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe?Human=true
          ./vulkan_sdk.exe --accept-licenses --default-answer --confirm-command install

      - name: Set Vulkan SDK environment variables
        shell: pwsh
        run: |
          $vulkanRoot = Get-ChildItem -Directory "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { Write-Host "Vulkan SDK not found!"; exit 1 }
          echo "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$($vulkanRoot.FullName)\Bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIB=$($vulkanRoot.FullName)\Lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
          
      - name: Build, Make, and Verify Installation
        run: |
          mkdir build
          cmake --preset "${{ inputs.cmake_config_preset }}"
          cmake --build ${{ env.BUILD_DIR }} --preset "${{ inputs.cmake_build_preset }}" --parallel 4
          if (Test-Path "${{ env.BUILD_DIR }}/Debug/${env:BUILD_FILE_NAME}") {
            Write-Host "✅ $env:BUILD_FILE_NAME has been successfully built!"
          } else {
            Write-Host "❌ $env:BUILD_FILE_NAME was not built!"
            exit 1
          }

      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare Distribution Artifacts
        #if: ${{ inputs.upload_to_s3 }}
        run: |
          mkdir ${{ env.DIST_DIR }}
          cp ${{ env.BUILD_DIR }}/${{ env.BUILD_FILE_NAME }} ${{ env.DIST_DIR }}/
          ls -l ${{ env.DIST_DIR }}/
      
      - name: Upload Build to S3
        if: ${{ inputs.upload_to_s3 }}
        run: |
          aws s3 cp ${{ env.DIST_DIR }} s3://${{ secrets.AWS_S3_BUCKET }}/test/ \
            --no-progress
