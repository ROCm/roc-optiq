name: "CodeQL"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    # Run on PRs targeting protected branches
    branches: [ main, dev ]
  schedule:
    - cron: '0 2 * * 0' # Weekly
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (CodeQL)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/rocm/optiq-ci-ubuntu:24.04
    permissions:
      actions: read
      security-events: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: cpp
        config-file: .github/codeql/codeql-config.yml

    - name: Build with CMake
      run: |
        mkdir -p build/linux-release
        cmake -B build/linux-release --preset "linux-release"
        cmake --build build/linux-release --preset "Linux Release Build" --parallel $(nproc)

    - name: Run CodeQL analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "security-and-quality"
