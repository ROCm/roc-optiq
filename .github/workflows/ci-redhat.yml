name: RedHat (Rockylinux) Continuous Integration
run-name: roc-optiq-redhat-ci

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'JSON array of OS version(s) to test'
        type: string
        default: '[ "9", "10" ]'
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'linux-release'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Linux Release Build'
      upload_to_github:
        description: 'Boolean to enable/disable uploading build artifacts to GitHub Artifacts'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Boolean to enable/disable uploading build artifacts to S3 Bucket'
        type: boolean
        default: false
  workflow_call:
    inputs:
      os_version:
        description: 'JSON array of OS version(s) to test'
        type: string
        default: '[ "9", "10" ]'
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'linux-release'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Linux Release Build'
      upload_to_github:
        description: 'Boolean to enable/disable uploading build artifacts to GitHub Artifacts'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Boolean to enable/disable uploading build artifacts to S3 Bucket'
        type: boolean
        default: false

env:
  BUILD_DIR: "build"
  DIST_DIR: "dist"
  BUILD_FILE_NAME: "roc-optiq"

jobs:
  rocky-linux:
    name: RedHat ${{ matrix.os-version }} • Build Optiq • Upload to S3 (${{ inputs.upload_to_s3 }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rocm/optiq-ci-rhel:${{ matrix.os-version }}
    strategy:
      fail-fast: false
      matrix: 
        os-version: ${{ fromJson(inputs.os_version) }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build, Make, and Verify Installation
        shell: bash
        run: |
          source /opt/vulkan/**/setup-env.sh
          cmake -B ${{ env.BUILD_DIR }} --preset ${{ inputs.cmake_config_preset }} --install-prefix /opt/roc-optiq
          cmake --build ${{ env.BUILD_DIR }} --parallel 4 --target package
          if [ -e build/${{ env.BUILD_FILE_NAME }} ]; then
            echo "✅ ${{ env.BUILD_FILE_NAME }} has been successfully built!"
          else
            echo "❌ ${{ env.BUILD_FILE_NAME }} was not built!"
            exit 1
          fi

      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare Distribution Artifacts
        run: |
          mkdir ${{ env.DIST_DIR }}
          cp ${{ env.BUILD_DIR }}/${{ env.BUILD_FILE_NAME }} ${{ env.DIST_DIR }}/
          cp ${{ env.BUILD_DIR }}/*.tar.gz ${{ env.DIST_DIR }}/
          cp ${{ env.BUILD_DIR }}/*.rpm ${{ env.DIST_DIR }}/
          ls -l ${{ env.DIST_DIR }}/

      - name: Upload GitHub Artifacts
        if: ${{ inputs.upload_to_github }}
        uses: actions/upload-artifact@v7
        with:
          name: roc-optiq-rhel-${{ matrix.os-version }}-release
          path: |
            ${{ env.DIST_DIR }}/${{ env.BUILD_FILE_NAME }}
            ${{ env.DIST_DIR }}/*.gz
            ${{ env.DIST_DIR }}/*.rpm
          retention-days: 2
      
      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Build to S3
        if: ${{ inputs.upload_to_s3 }}
        run: |
          aws s3 cp ${{ env.DIST_DIR }} s3://${{ secrets.AWS_S3_BUCKET }}/test/ \
            --no-progress
