name: macOS Build and Package Release
run-name: ${{ github.workflow }} • ${{ github.event.client_payload.enable_symbols == 'true' && 'with symbols' || 'release' }}

on:
  workflow_dispatch:
  repository_dispatch:
      types: [trigger-release-build]

env:
  VISUALIZER_FILE_NAME: "roc-optiq"
  PRESET_CONFIG: ${{ github.event.client_payload.enable_symbols == 'true' && 'macos-release-symbols' || 'macos-release' }}
  PRESET_BUILD: ${{ github.event.client_payload.enable_symbols == 'true' && 'macOS Release Build with Symbols' || 'macOS Release Build' }}
  BUILD_DIR: ${{ github.event.client_payload.enable_symbols == 'true' && 'build/macos-release-symbols' || 'build/macos-release' }}
  ENABLE_INTERNAL_BANNER: ${{ github.event.client_payload.enable_internal_banner == 'true' && 'ON' || 'OFF' }}
  VULKAN_SDK_VERSION: "1.4.328.1"

jobs:
  macos:
    name: macOS ${{ matrix.macos-version }} • Build and Package Visualizer
    strategy:
      matrix:
        include:
          - macos-version: "14"
          - macos-version: "15"
    runs-on: macos-${{ matrix.macos-version }}
    env:
      ARTIFACT_NAME: roc-optiq-macos-${{ matrix.macos-version }}-${{ github.event.client_payload.enable_symbols == 'true' && 'release-symbols' || 'release' }}

    steps:
      - name: Print Workflow Inputs
        run: |
          echo "Target Ref: ${{ github.event.client_payload.ref || github.ref }}"

      - name: Print Build Configuration
        run: |
          echo "PRESET_CONFIG: ${{ env.PRESET_CONFIG }}"
          echo "PRESET_BUILD: ${{ env.PRESET_BUILD }}"
          echo "BUILD_DIR: ${{ env.BUILD_DIR }}"
          echo "ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}"
          echo "ENABLE_INTERNAL_BANNER: ${{ env.ENABLE_INTERNAL_BANNER }}"

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
          submodules: true

      - name: Install Vulkan SDK
        run: |
          set -euo pipefail
          V="${{ env.VULKAN_SDK_VERSION }}"
          ZIP_URL="https://sdk.lunarg.com/sdk/download/${V}/mac/vulkan-sdk-${V}-macos.zip?Human=true"
          WORK="${RUNNER_TEMP}/vulkan-sdk-install"
          mkdir -p "${WORK}"
          echo "Downloading Vulkan SDK ${V}..."
          curl -fsSL "${ZIP_URL}" -o "${WORK}/vulkan-sdk.zip"
          unzip -q "${WORK}/vulkan-sdk.zip" -d "${WORK}/extract"

          SDK_APP=$(find "${WORK}/extract" -name 'vulkansdk-macOS-*.app' -type d | head -1)
          if [ -z "${SDK_APP}" ]; then
            echo "❌ vulkansdk-macOS-*.app not found in archive"
            find "${WORK}/extract" -maxdepth 4 -type d
            exit 1
          fi

          INSTALLER="${SDK_APP}/Contents/MacOS/vulkansdk-macOS-${V}"
          if [ ! -f "${INSTALLER}" ]; then
            echo "❌ Expected installer missing: ${INSTALLER}"
            ls -la "${SDK_APP}/Contents/MacOS"
            exit 1
          fi

          SDK_ROOT="${HOME}/VulkanSDK/${V}"
          # Qt IFW: options first, then command, then key=value (see installer --help).
          # copy_only=1: SDK files only, no /usr/local (LunarG macOS getting started).
          "${INSTALLER}" \
            --root "${SDK_ROOT}" \
            --accept-licenses \
            --default-answer \
            --confirm-command \
            install \
            copy_only=1

          if [ ! -d "${SDK_ROOT}" ]; then
            echo "❌ SDK root not created: ${SDK_ROOT}"
            exit 1
          fi

          echo "VULKAN_SDK=${SDK_ROOT}" >> "${GITHUB_ENV}"
          if [ -d "${SDK_ROOT}/macOS/bin" ]; then
            echo "PATH=${SDK_ROOT}/macOS/bin:${PATH}" >> "${GITHUB_ENV}"
          elif [ -d "${SDK_ROOT}/bin" ]; then
            echo "PATH=${SDK_ROOT}/bin:${PATH}" >> "${GITHUB_ENV}"
          fi
          if [ -d "${SDK_ROOT}/macOS/lib" ]; then
            echo "DYLD_LIBRARY_PATH=${SDK_ROOT}/macOS/lib${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}" >> "${GITHUB_ENV}"
          fi
          echo "✅ Vulkan SDK installed at ${SDK_ROOT}"

      - name: Build, Make, and Verify Installation
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          cmake -B ${{ env.BUILD_DIR }} --preset "${{ env.PRESET_CONFIG }}" -DROCPROFVIS_ENABLE_INTERNAL_BANNER=${{ env.ENABLE_INTERNAL_BANNER }}
          cmake --build ${{ env.BUILD_DIR }} --preset "${{ env.PRESET_BUILD }}" --parallel 4 --target package

          if [ -d "${{ env.BUILD_DIR }}/${{ env.VISUALIZER_FILE_NAME }}.app" ]; then
            echo "✅ ${{ env.VISUALIZER_FILE_NAME }}.app has been successfully built!"
          else
            echo "❌ ${{ env.VISUALIZER_FILE_NAME }}.app was not built!"
            exit 1
          fi

      - name: List build artifacts
        run: |
          ls -la ${{ env.BUILD_DIR }}

      - name: Upload Visualizer Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.BUILD_DIR }}/${{ env.VISUALIZER_FILE_NAME }}.app
            ${{ env.BUILD_DIR }}/*.tar.gz
            ${{ env.BUILD_DIR }}/*.tgz
          retention-days: 2
