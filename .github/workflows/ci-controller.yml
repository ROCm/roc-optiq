name: Continuous Integration Controller
run-name: roc-optiq-ci

on:
  workflow_dispatch:
    inputs:
      enable_full_os_versions:
        description: 'Run CI for all OS versions?'
        type: boolean
        default: false
      enable_ci_redhat:
        description: 'Run RedHat CI?'
        type: boolean
        default: true
      enable_ci_ubuntu:
        description: 'Run Ubuntu CI?'
        type: boolean
        default: true
      enable_ci_windows:
        description: 'Run Windows CI?'
        type: boolean
        default: true
      enable_ci_mac:
        description: 'Run macOS CI?'
        type: boolean
        default: true
      upload_to_github:
        description: 'Upload build artifacts to GitHub Artifacts?'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Upload build artifacts to the roc-optiq S3 bucket?'
        type: boolean
        default: false
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    env:
      # Full OS Coverage (default for scheduled runs)
      UBUNTU_FULL_OS_VERSIONS: '[ "22.04", "24.04" ]'
      REDHAT_FULL_OS_VERSIONS: '[ "8", "9", "10" ]'
      WINDOWS_FULL_OS_VERSIONS: '[ "2025" ]'
      MAC_FULL_OS_VERSIONS: '[ "14", "15", "26" ]'
      # Minimal OS Coverage (default for all other runs)
      UBUNTU_CI_OS_VERSIONS: '[ "24.04" ]'
      REDHAT_CI_OS_VERSIONS: '[ "10" ]'
      WINDOWS_CI_OS_VERSIONS: '[ "2025" ]'
      MAC_CI_OS_VERSIONS: '[ "26" ]'
    outputs:
      ubuntu-os-versions: ${{ steps.setup-os-versions.outputs.ubuntu-os-versions }}
      redhat-os-versions: ${{ steps.setup-os-versions.outputs.redhat-os-versions }}
      windows-os-versions: ${{ steps.setup-os-versions.outputs.windows-os-versions }}
      mac-os-versions: ${{ steps.setup-os-versions.outputs.mac-os-versions }}
    steps:
      - name: Set OS versions
        id: setup-os-versions
        run: |
          if [ "${{ github.event_name }}" = "schedule" || "${{ github.event.inputs.enable_full_os_versions }}" == "true" ]; then
            echo "ubuntu-os-versions=${{ env.UBUNTU_FULL_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
            echo "redhat-os-versions=${{ env.REDHAT_FULL_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
            echo "windows-os-versions=${{ env.WINDOWS_FULL_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
            echo "mac-os-versions=${{ env.MAC_FULL_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
          else
            echo "ubuntu-os-versions=${{ env.UBUNTU_CI_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
            echo "redhat-os-versions=${{ env.REDHAT_CI_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
            echo "windows-os-versions=${{ env.WINDOWS_CI_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
            echo "mac-os-versions=${{ env.MAC_CI_OS_VERSIONS }}" >> "$GITHUB_OUTPUT"
          fi

  ci-redhat:
    name: RedHat CI
    needs: setup
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_ci_redhat }}
    uses: ./.github/workflows/ci-redhat.yml
    secrets: inherit
    with:
      os_version: ${{ needs.setup.outputs.redhat-os-versions }}
      upload_to_github: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_github == 'true' }}
      upload_to_s3: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_s3 == 'true' }}

  ci-ubuntu:
    name: Ubuntu CI
    needs: setup
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_ci_ubuntu }}
    uses: ./.github/workflows/ci-ubuntu.yml
    secrets: inherit
    with:
      os_version: ${{ needs.setup.outputs.ubuntu-os-versions }}
      upload_to_github: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_github == 'true' }}
      upload_to_s3: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_s3 == 'true' }}

  ci-windows:
    name: Windows CI
    needs: setup
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_ci_windows }}
    uses: ./.github/workflows/ci-windows.yml
    secrets: inherit
    with:
      os_version: ${{ needs.setup.outputs.windows-os-versions }}
      upload_to_github: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_github == 'true' }}
      upload_to_s3: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_s3 == 'true' }}

  ci-mac:
    name: macOS CI
    needs: setup
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_ci_mac }}
    uses: ./.github/workflows/ci-mac.yml
    secrets: inherit
    with:
      os_version: ${{ needs.setup.outputs.mac-os-versions }}
      upload_to_github: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_github == 'true' }}
      upload_to_s3: ${{ github.event_name == 'schedule' || github.event.inputs.upload_to_s3 == 'true' }}
