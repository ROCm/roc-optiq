name: Windows Build and Package Release
run-name: ${{ github.workflow }} • ${{ github.event.client_payload.enable_symbols == 'true' && 'with symbols' || 'release' }}

on:
  workflow_dispatch:
  repository_dispatch:
      types: [trigger-release-build]

env:
  VISUALIZER_FILE_NAME: "roc-optiq"
  PRESET_CONFIG: ${{ github.event.client_payload.enable_symbols == 'true' && 'x64-release-symbols' || 'x64-release' }}
  PRESET_BUILD: ${{ github.event.client_payload.enable_symbols == 'true' && 'Windows Release Build with Symbols' || 'Windows Release Build' }}
  BUILD_DIR: ${{ github.event.client_payload.enable_symbols == 'true' && 'build/x64-release-symbols' || 'build/x64-release' }}
  ARTIFACT_NAME: roc-optiq-${{ github.event.client_payload.enable_symbols == 'true' && 'release-symbols' || 'release' }}
  BIN_DIR: ${{ github.event.client_payload.enable_symbols == 'true' && 'RelWithDebInfo' || 'Release' }}
  ENABLE_INTERNAL_BANNER: ${{ github.event.client_payload.enable_internal_banner == 'true' && 'ON' || 'OFF' }}
  CRYPTO_BACKEND: ${{ github.event.client_payload.crypto_backend || 'mbedTLS' }}

jobs:
  windows:
    name: Windows • Build and Package Visualizer
    runs-on: windows-latest

    steps:
      - name: Print Workflow Inputs
        run: |
          echo "Target Ref: ${{ github.event.client_payload.ref || github.ref }}"

      - name: Print Build Configuration
        run: |
          echo "PRESET_CONFIG: ${{ env.PRESET_CONFIG }}"
          echo "PRESET_BUILD: ${{ env.PRESET_BUILD }}"
          echo "BUILD_DIR: ${{ env.BUILD_DIR }}"
          echo "ARTIFACT_NAME: ${{ env.ARTIFACT_NAME }}"
          echo "BIN_DIR: ${{ env.BIN_DIR }}"
          echo "ENABLE_INTERNAL_BANNER: ${{ env.ENABLE_INTERNAL_BANNER }}"

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}
          submodules: true
      - name: Install Vulkan SDK
        run: |
          curl -O https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe?Human=true
          ./vulkan_sdk.exe --accept-licenses --default-answer --confirm-command install
      - name: Set Vulkan SDK environment variables
        shell: pwsh
        run: |
          $vulkanRoot = Get-ChildItem -Directory "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { Write-Host "Vulkan SDK not found!"; exit 1 }
          echo "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$($vulkanRoot.FullName)\Bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIB=$($vulkanRoot.FullName)\Lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install OpenSSL
        if: env.CRYPTO_BACKEND == 'OpenSSL'
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          $opensslRoot = "C:\Program Files\OpenSSL-Win64"
          if (-not (Test-Path $opensslRoot)) {
            $opensslRoot = (Get-ChildItem -Directory "C:\Program Files" -Filter "OpenSSL*" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          }
          if (-not $opensslRoot) { Write-Host "OpenSSL not found!"; exit 1 }
          echo "OPENSSL_ROOT_DIR=$opensslRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$opensslRoot\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          # Newer Shining Light / choco builds nest the MSVC import libs under
          # lib\VC\x64\MD (dynamic CRT release). CMake's FindOpenSSL may not find
          # them from OPENSSL_ROOT_DIR alone, so locate and export explicit hints.
          $crypto = Get-ChildItem -Path $opensslRoot -Recurse -Filter "libcrypto.lib" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64\\MD\\" -and $_.FullName -notmatch "static" } | Select-Object -First 1
          $ssl = Get-ChildItem -Path $opensslRoot -Recurse -Filter "libssl.lib" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64\\MD\\" -and $_.FullName -notmatch "static" } | Select-Object -First 1
          if ($crypto -and $ssl) {
            echo "OPENSSL_LIB_EAY_RELEASE=$($crypto.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "OPENSSL_SSL_EAY_RELEASE=$($ssl.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build, Make, and Verify Installation
        run: |
          mkdir build
          $opensslArgs = @()
          if ("${{ env.CRYPTO_BACKEND }}" -eq "OpenSSL" -and $env:OPENSSL_LIB_EAY_RELEASE) {
            $opensslArgs = @("-DLIB_EAY_RELEASE=$env:OPENSSL_LIB_EAY_RELEASE", "-DSSL_EAY_RELEASE=$env:OPENSSL_SSL_EAY_RELEASE", "-DOPENSSL_INCLUDE_DIR=$env:OPENSSL_ROOT_DIR\include")
          }
          cmake --preset "${{ env.PRESET_CONFIG }}" -DROCPROFVIS_ENABLE_INTERNAL_BANNER=${{ env.ENABLE_INTERNAL_BANNER }} -DCRYPTO_BACKEND=${{ env.CRYPTO_BACKEND }} @opensslArgs
          cmake --build ${{ env.BUILD_DIR }} --preset "${{ env.PRESET_BUILD }}" --parallel 4
          if (Test-Path "${{ env.BUILD_DIR }}/${{ env.BIN_DIR }}/${env:VISUALIZER_FILE_NAME}.exe") {
            Write-Host "✅ $env:VISUALIZER_FILE_NAME has been successfully built!"
          } else {
            Write-Host "❌ $env:VISUALIZER_FILE_NAME was not built!"
            exit 1
          }

      - name: Prepare Windows artifact bundle
        shell: pwsh
        run: |
          $out = "${{ env.BUILD_DIR }}/${{ env.BIN_DIR }}"
          $stage = "windows-artifact-staging"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item "$out/${{ env.VISUALIZER_FILE_NAME }}.exe" $stage/
          Copy-Item "$out/*.dll" $stage/ -ErrorAction SilentlyContinue
          Copy-Item "$out/${{ env.VISUALIZER_FILE_NAME }}.pdb" $stage/ -ErrorAction SilentlyContinue
          Get-ChildItem $stage

      - name: Upload Visualizer Binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: windows-artifact-staging/
          if-no-files-found: error
          retention-days: 2
