name: Mac Continuous Integration
run-name: roc-optiq-mac-ci

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'JSON array of OS versions to test'
        type: string
        default: '[ "14", "15", "26" ]'
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'macos-release'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'macOS Release Build'
      enable_internal_banner:
        description: 'Enable the internal banner?'
        type: boolean
        default: false
      upload_to_github:
        description: 'Upload build artifacts to GitHub Artifacts?'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Upload built artifacts to the roc-optiq S3 bucket?'
        type: boolean
        default: false
      s3_root_directory:
        description: 'The root directory to use when uploading to the roc-optiq S3 bucket'
        type: choice
        default: 'test'
        options: 
          - test
          - nightly
          - rc
          - release
  workflow_call:
    inputs:
      os_version:
        description: 'JSON array of OS versions to test'
        type: string
        default: '[ "14", "15", "26" ]'
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'macos-release'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'macOS Release Build'
      enable_internal_banner:
        description: 'Enable the internal banner?'
        type: boolean
        default: false
      upload_to_github:
        description: 'Upload build artifacts to GitHub Artifacts?'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Upload built artifacts to the roc-optiq S3 bucket?'
        type: boolean
        default: false
      s3_root_directory:
        description: 'The root directory to use when uploading to the roc-optiq S3 bucket'
        type: string
        default: 'test'

env:
  BUILD_DIR: "build"
  DIST_DIR: "dist"
  BUILD_FILE_NAME: "roc-optiq"
  VULKAN_SDK_VERSION: "1.4.328.1"
  ENABLE_INTERNAL_BANNER: ${{ inputs.enable_internal_banner == 'true' && 'ON' || 'OFF' }}

jobs:
  mac:
    name: macOS ${{ matrix.os-version }} • Optiq CI • GitHub Artifacts (${{ inputs.upload_to_github }}) • S3 Artifacts (${{ inputs.upload_to_s3 }})
    runs-on: macos-${{ matrix.os-version }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: 
        os-version: ${{ fromJson(inputs.os_version) }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: true

      - name: Install Vulkan SDK
        run: |
          set -euo pipefail
          V="${{ env.VULKAN_SDK_VERSION }}"
          ZIP_URL="https://sdk.lunarg.com/sdk/download/${V}/mac/vulkan-sdk-${V}-macos.zip?Human=true"
          WORK="${RUNNER_TEMP}/vulkan-sdk-install"
          mkdir -p "${WORK}"
          echo "Downloading Vulkan SDK ${V}..."
          curl -fsSL "${ZIP_URL}" -o "${WORK}/vulkan-sdk.zip"
          unzip -q "${WORK}/vulkan-sdk.zip" -d "${WORK}/extract"

          SDK_APP=$(find "${WORK}/extract" -name 'vulkansdk-macOS-*.app' -type d | head -1)
          if [ -z "${SDK_APP}" ]; then
            echo "❌ vulkansdk-macOS-*.app not found in archive"
            find "${WORK}/extract" -maxdepth 4 -type d
            exit 1
          fi

          INSTALLER="${SDK_APP}/Contents/MacOS/vulkansdk-macOS-${V}"
          if [ ! -f "${INSTALLER}" ]; then
            echo "❌ Expected installer missing: ${INSTALLER}"
            ls -la "${SDK_APP}/Contents/MacOS"
            exit 1
          fi

          SDK_ROOT="${HOME}/VulkanSDK/${V}"
          # Qt IFW: options first, then command, then key=value (see installer --help).
          # copy_only=1: SDK files only, no /usr/local (LunarG macOS getting started).
          "${INSTALLER}" \
            --root "${SDK_ROOT}" \
            --accept-licenses \
            --default-answer \
            --confirm-command \
            install \
            copy_only=1

          if [ ! -d "${SDK_ROOT}" ]; then
            echo "❌ SDK root not created: ${SDK_ROOT}"
            exit 1
          fi

          # LunarG macOS SDK places headers and libs under .../macOS/, not the versioned root.
          VULKAN_SDK_DIR="${SDK_ROOT}/macOS"
          if [ ! -d "${VULKAN_SDK_DIR}" ]; then
            VULKAN_SDK_DIR="${SDK_ROOT}"
          fi

          # Verify the headers are present.
          if [ ! -f "${VULKAN_SDK_DIR}/include/vulkan/vulkan.h" ]; then
            echo "❌ Vulkan headers not found at ${VULKAN_SDK_DIR}/include/vulkan/vulkan.h"
            find "${SDK_ROOT}" -name 'vulkan.h' 2>/dev/null | head -5
            exit 1
          fi

          # Resolve the actual Vulkan loader library. The SDK ships libvulkan.dylib
          # but may only provide a versioned name (libvulkan.1.dylib). Prefer the
          # unversioned symlink so CMake's find_library(NAMES vulkan) matches.
          VULKAN_LIB="${VULKAN_SDK_DIR}/lib/libvulkan.dylib"
          if [ ! -f "${VULKAN_LIB}" ]; then
            VULKAN_LIB=$(find "${VULKAN_SDK_DIR}/lib" -maxdepth 1 -name 'libvulkan*.dylib' | sort | head -1)
          fi
          if [ -z "${VULKAN_LIB}" ] || [ ! -f "${VULKAN_LIB}" ]; then
            echo "❌ Vulkan library not found under ${VULKAN_SDK_DIR}/lib"
            ls -la "${VULKAN_SDK_DIR}/lib" || true
            exit 1
          fi

          echo "VULKAN_SDK=${VULKAN_SDK_DIR}" >> "${GITHUB_ENV}"
          echo "Vulkan_INCLUDE_DIR=${VULKAN_SDK_DIR}/include" >> "${GITHUB_ENV}"
          echo "Vulkan_LIBRARY=${VULKAN_LIB}" >> "${GITHUB_ENV}"
          if [ -d "${VULKAN_SDK_DIR}/bin" ]; then
            echo "PATH=${VULKAN_SDK_DIR}/bin:${PATH}" >> "${GITHUB_ENV}"
          fi
          if [ -d "${VULKAN_SDK_DIR}/lib" ]; then
            echo "DYLD_LIBRARY_PATH=${VULKAN_SDK_DIR}/lib${DYLD_LIBRARY_PATH:+:${DYLD_LIBRARY_PATH}}" >> "${GITHUB_ENV}"
          fi
          echo "✅ Vulkan SDK installed at ${SDK_ROOT} (VULKAN_SDK=${VULKAN_SDK_DIR}, Vulkan_LIBRARY=${VULKAN_LIB})"

      - name: Build, Make, and Verify Installation
        run: |
          mkdir -p ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}
          cmake -B ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }} --preset "${{ inputs.cmake_config_preset }}" -DROCPROFVIS_ENABLE_INTERNAL_BANNER=${{ env.ENABLE_INTERNAL_BANNER }}  -DVulkan_INCLUDE_DIR="$Vulkan_INCLUDE_DIR" -DVulkan_LIBRARY="$Vulkan_LIBRARY"
          cmake --build ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }} --preset "${{ inputs.cmake_build_preset }}" --parallel 4 --target package
          ls -l ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}

          if [ -d "${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/${{ env.BUILD_FILE_NAME }}.app" ]; then
            echo "✅ ${{ env.BUILD_FILE_NAME }}.app has been successfully built!"
          else
            echo "❌ ${{ env.BUILD_FILE_NAME }}.app was not built!"
            exit 1
          fi

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        timeout-minutes: 10
        run: |
          cd ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}
          ctest \
            --output-on-failure \
            --no-tests=error \
            --output-junit ctest-results.xml

      - name: Upload Test Logs (on failure)
        if: steps.run_tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-mac-${{ matrix.os-version }}
          path: |
            ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/ctest-results.xml
            ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/Testing/Temporary/**
          retention-days: 7

      - name: Prepare Distribution Artifacts
        run: |
          mkdir ${{ env.DIST_DIR }}/
          cp -a ${{ env.BUILD_DIR }}/${{ inputs.cmake_config_preset }}/${{ env.BUILD_FILE_NAME }}.app ${{ env.DIST_DIR }}/
          ls -l ${{ env.DIST_DIR }}/

      - name: Upload GitHub Artifacts
        if: ${{ inputs.upload_to_github }}
        uses: actions/upload-artifact@v7
        with:
          name: roc-optiq-macos-${{ matrix.os-version }}-release
          path: |
            ${{ env.DIST_DIR }}
          retention-days: 2
      
      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Build to S3
        if: ${{ inputs.upload_to_s3 }}
        run: |
          ditto -c -k --keepParent ${{ env.DIST_DIR }}/${{ env.BUILD_FILE_NAME }}.app ${{ env.DIST_DIR }}/${{ env.BUILD_FILE_NAME }}.app.zip
          TIMESTAMP=$(date +%Y_%m_%d)
          aws s3 cp ${{ env.DIST_DIR }}/${{ env.BUILD_FILE_NAME }}.app.zip s3://${{ secrets.AWS_S3_BUCKET }}/${{ inputs.s3_root_directory }}}/$TIMESTAMP/mac/${{ matrix.os-version }}/ \
            --no-progress
      
      - name: Announce Test Failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "Tests have failed! Please see uploaded CTest logs for more information"
          exit 1

