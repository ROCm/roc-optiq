name: Windows Continuous Integration 
run-name: roc-optiq-windows-ci

on:
  workflow_dispatch:
    inputs:
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'x64-debug'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Windows Debug Build'
      enable_internal_banner:
        description: 'Boolean to enable/disable the internal banner'
        type: boolean
        default: false
      upload_to_github:
        description: 'Boolean to enable/disable uploading build artifacts to GitHub Artifacts'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Boolean to enable/disable uploading build artifacts to S3 Bucket'
        type: boolean
        default: false
  workflow_call:
    inputs:
      cmake_config_preset:
        description: 'CMake Config Preset to Use'
        type: string
        default: 'x64-debug'
      cmake_build_preset:
        description: 'CMake Build Preset to Use'
        type: string
        default: 'Windows Debug Build'
      enable_internal_banner:
        description: 'Boolean to enable/disable the internal banner'
        type: boolean
        default: false
      upload_to_github:
        description: 'Boolean to enable/disable uploading build artifacts to GitHub Artifacts'
        type: boolean
        default: false
      upload_to_s3:
        description: 'Boolean to enable/disable uploading build artifacts to S3 Bucket'
        type: boolean
        default: false

env:
  BUILD_DIR: "build/x64-debug"
  DIST_DIR: "dist"
  BUILD_FILE_NAME: "roc-optiq"
  ENABLE_INTERNAL_BANNER: ${{ inputs.enable_internal_banner == 'true' && 'ON' || 'OFF' }}

jobs:
  windows:
    name: Windows • Optiq CI • GitHub Artifacts (${{ inputs.upload_to_github }}) • S3 Artifacts (${{ inputs.upload_to_s3 }})
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true
      
      - name: Install Vulkan SDK
        run: |
          curl -O https://sdk.lunarg.com/sdk/download/latest/windows/vulkan_sdk.exe?Human=true
          ./vulkan_sdk.exe --accept-licenses --default-answer --confirm-command install

      - name: Set Vulkan SDK environment variables
        shell: pwsh
        run: |
          $vulkanRoot = Get-ChildItem -Directory "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) { Write-Host "Vulkan SDK not found!"; exit 1 }
          echo "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$($vulkanRoot.FullName)\Bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIB=$($vulkanRoot.FullName)\Lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
          
      - name: Build, Make, and Verify Installation
        run: |
          mkdir build
          cmake --preset "${{ inputs.cmake_config_preset }}" -DROCPROFVIS_ENABLE_INTERNAL_BANNER=${{ env.ENABLE_INTERNAL_BANNER }}
          cmake --build ${{ env.BUILD_DIR }} --preset "${{ inputs.cmake_build_preset }}" --parallel 4
          if (Test-Path "${{ env.BUILD_DIR }}/Debug/${env:BUILD_FILE_NAME}.exe") {
            Write-Host "✅ $env:BUILD_FILE_NAME has been successfully built!"
          } else {
            Write-Host "❌ $env:BUILD_FILE_NAME was not built!"
            exit 1
          }

      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare Distribution Artifacts
        run: |
          mkdir ${{ env.DIST_DIR }}
          cp ${{ env.BUILD_DIR }}/Debug/${{ env.BUILD_FILE_NAME }}.exe ${{ env.DIST_DIR }}/
          cp ${{ env.BUILD_DIR }}/Debug/${{ env.BUILD_FILE_NAME }}.pdb ${{ env.DIST_DIR }}/
          cp ${{ env.BUILD_DIR }}/Debug/glfw3.dll ${{ env.DIST_DIR }}/
          ls -l ${{ env.DIST_DIR }}/
      
      - name: Upload GitHub Artifacts
        if: ${{ inputs.upload_to_github }}
        uses: actions/upload-artifact@v7
        with:
          name: roc-optiq-windows-release
          path: | 
            ${{ env.DIST_DIR }}/${{ env.BUILD_FILE_NAME }}.exe
            ${{ env.DIST_DIR }}/${{ env.BUILD_FILE_NAME }}.pdb
            ${{ env.DIST_DIR }}/glfw3.dll
          retention-days: 2

      - name: Configure AWS credentials
        if: ${{ inputs.upload_to_s3 }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload Build to S3
        if: ${{ inputs.upload_to_s3 }}
        run: |
          aws s3 cp ${{ env.DIST_DIR }} s3://${{ secrets.AWS_S3_BUCKET }}/test/ \
            --no-progress
