name: Continuous Integration Controller
run-name: roc-optiq-ci

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Full OS Coverage (for nightly scheduled builds)
  UBUNTU_FULL_OS_VERSIONS: '[ "22.04", "24.04" ]'
  REDHAT_FULL_OS_VERSIONS: '[ "9", "10" ]'
  MAC_FULL_OS_VERSION: '[ "14", "15", "26" ]'
  # Minimal OS Coverage (for all other builds)
  UBUNTU_CI_OS_VERSIONS: '[ "24.04" ]'
  REDHAT_CI_OS_VERSIONS: '[ "10" ]'
  MAC_CI_OS_VERSIONS: '[ "26" ]'

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      ubuntu-os-versions: ${{ steps.set-versions.outputs.ubuntu-os-versions }}
      redhat-os-versions: ${{ steps.set-versions.outputs.redhat-os-versions }}
      mac-os-versions: ${{ steps.set-versions.outputs.mac-os-versions }}
    steps:
      - name: Set OS versions
        id: set-versions
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo 'ubuntu-os-versions=[ "22.04", "24.04" ]' >> "$GITHUB_OUTPUT"
            echo 'redhat-os-versions=[ "9", "10" ]' >> "$GITHUB_OUTPUT"
            echo 'mac-os-versions=[ "14", "15", "26" ]' >> "$GITHUB_OUTPUT"
          else
            echo 'ubuntu-os-versions=[ "24.04" ]' >> "$GITHUB_OUTPUT"
            echo 'redhat-os-versions=[ "10" ]' >> "$GITHUB_OUTPUT"
            echo 'mac-os-versions=[ "14", "15", "26" ]' >> "$GITHUB_OUTPUT"
          fi

  ci-redhat:
    name: RedHat CI
    needs: setup
    if: false
    uses: ./.github/workflows/ci-redhat.yml
    with:
      os_version: ${{ needs.setup.outputs.redhat-os-versions }}

  ci-ubuntu:
    name: Ubuntu CI
    needs: setup
    if: false
    uses: ./.github/workflows/ci-ubuntu.yml
    with:
      os_version: ${{ needs.setup.outputs.ubuntu-os-versions }}

  ci-windows:
    name: Windows CI
    if: false
    needs: setup
    uses: ./.github/workflows/ci-windows.yml

  ci-mac:
    name: macOS CI
    needs: setup
    uses: ./.github/workflows/ci-mac.yml
    with:
      os_version: ${{ needs.setup.outputs.mac-os-versions }}