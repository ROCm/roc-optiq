name: Redhat Continuous Integration
run-name: roc-optiq-redhat-ci

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '*.md'

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VISUALIZER_FILE_NAME: "roc-optiq"

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Full matrix for the 'schedule' event
            echo "matrix={\"os-release\":[\"9\", \"10\"]}" >> "$GITHUB_OUTPUT"
          else
            # Limited matrix for other events (push, pull_request)
            echo "matrix={\"os-release\":[\"10\"]}" >> "$GITHUB_OUTPUT"
          fi

  rocky-linux:
    needs: [set-matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
      # matrix:
      #     os-release: [ '9', '10' ]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rocm/optiq-ci-rhel:${{ matrix.os-release }}
    name: RockyLinux ${{ matrix.os-release }} • Build Optiq

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build, Make, and Verify Installation
        run: |
          source /opt/vulkan/${{ matrix.vulkan-sdk }}/setup-env.sh
          cmake -B build --install-prefix /opt/rocprofiler-visualizer
          cmake --build build --parallel 4
          if [ -e build/${{ env.VISUALIZER_FILE_NAME }} ]; then
            echo "✅ ${{ env.VISUALIZER_FILE_NAME }} has been successfully built!"
          else
            echo "❌ ${{ env.VISUALIZER_FILE_NAME }} was not built!"
            exit 1
          fi
